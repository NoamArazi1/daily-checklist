<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f3d3e">
<title>מעקב נשקים</title>
<style>
  :root{
    --bg:#0f1a1a; --panel:#132626; --panel2:#0f1f1f;
    --line:#21403f; --ink:#eaf4f2; --mut:#8fb3ad;
    --me:#1f6f5c; --bot:#1a2e2e; --accent:#37d39a;
    --warn:#e0a83a; --bad:#e06a5a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;
    display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;
  }
  header{
    background:linear-gradient(180deg,#15403c,#0f2e2c);
    padding:12px 16px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;
  }
  header h1{font-size:18px;margin:0;font-weight:700;flex:1}
  .chip{
    background:#0c2120;border:1px solid var(--line);border-radius:999px;
    padding:6px 12px;font-size:14px;font-weight:700;white-space:nowrap;
  }
  .chip b{color:var(--accent)}
  .chip.full b{color:var(--accent)}
  .chip.partial b{color:var(--warn)}
  nav{display:flex;background:var(--panel2);border-bottom:1px solid var(--line)}
  nav button{
    flex:1;background:none;border:none;color:var(--mut);
    padding:12px;font-size:15px;font-weight:700;font-family:inherit;
    border-bottom:3px solid transparent;cursor:pointer;
  }
  nav button.on{color:var(--ink);border-bottom-color:var(--accent)}

  /* ---- צ'אט ---- */
  #chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:85%;padding:10px 14px;border-radius:16px;line-height:1.5;font-size:15px;white-space:pre-wrap;word-break:break-word}
  .msg.me{align-self:flex-start;background:var(--me);border-bottom-right-radius:4px}
  .msg.bot{align-self:flex-end;background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg .t{display:block;font-size:11px;color:var(--mut);margin-top:6px}
  .msg ul{margin:6px 0 0;padding-inline-start:18px}
  .ok{color:var(--accent);font-weight:700}
  .miss{color:var(--warn);font-weight:700}
  .unk{color:var(--bad);font-weight:700}

  .composer{
    display:flex;gap:8px;padding:10px;background:var(--panel2);
    border-top:1px solid var(--line);align-items:flex-end;
  }
  .composer textarea{
    flex:1;resize:none;min-height:46px;max-height:140px;
    background:#0b1a1a;color:var(--ink);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;font-size:16px;font-family:inherit;
  }
  .send{
    background:var(--accent);color:#04231a;border:none;border-radius:14px;
    padding:0 18px;height:46px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;
  }
  .quick{display:flex;gap:8px;padding:0 10px 10px;background:var(--panel2)}
  .quick button{
    flex:1;background:#0c2120;color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
  }

  /* ---- רשימה ---- */
  #list{flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:12px}
  #list p{margin:0;color:var(--mut);font-size:14px;line-height:1.6}
  #listText{
    width:100%;min-height:240px;background:#0b1a1a;color:var(--ink);
    border:1px solid var(--line);border-radius:14px;padding:14px;
    font-size:16px;font-family:inherit;line-height:1.7;
  }
  .row{display:flex;gap:8px}
  .btn{
    flex:1;background:var(--accent);color:#04231a;border:none;border-radius:12px;
    padding:13px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;
  }
  .btn.sec{background:#0c2120;color:var(--ink);border:1px solid var(--line)}
  .count{font-size:14px;color:var(--mut);text-align:center}
  .toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:#04231a;color:var(--accent);border:1px solid var(--accent);
    padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;
    opacity:0;transition:opacity .2s;pointer-events:none;z-index:9;
  }
  .toast.show{opacity:1}
</style>
</head>
<body>
  <header>
    <h1>🔫 מעקב נשקים</h1>
    <div class="chip" id="chip">—</div>
  </header>

  <nav>
    <button id="tabChat" class="on" onclick="showTab('chat')">צ'אט</button>
    <button id="tabList" onclick="showTab('list')">הרשימה</button>
  </nav>

  <!-- צ'אט -->
  <div id="chat"></div>
  <div class="quick">
    <button onclick="askStatus()">📊 מה חסר?</button>
    <button onclick="newDay()">🔄 יום חדש</button>
  </div>
  <div class="composer">
    <textarea id="input" placeholder="הדבק כאן את הדוח (טקסט עם מספרים)…" rows="1"></textarea>
    <button class="send" onclick="sendReport()">שלח</button>
  </div>

  <!-- רשימה -->
  <div id="list">
    <p>רשימת מספרי הנשק הקבועה. מספר אחד בכל שורה. כאן מעדכנים אותה מתי שצריך.</p>
    <textarea id="listText" placeholder="1234567&#10;2345678&#10;3456789"></textarea>
    <div class="count" id="listCount"></div>
    <div class="row">
      <button class="btn" onclick="saveList()">💾 שמור רשימה</button>
    </div>
    <p style="margin-top:8px">שמירת רשימה חדשה מאפסת את הסימונים ומתחילה יום חדש.</p>
  </div>

  <div class="toast" id="toast"></div>

<script>
const K={list:'wt_list',rep:'wt_reported',chat:'wt_chat'};
let weapons = load(K.list, []);
let reported = new Set(load(K.rep, []));
let chat = load(K.chat, []);

function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function save(){
  try{
    localStorage.setItem(K.list,JSON.stringify(weapons));
    localStorage.setItem(K.rep,JSON.stringify([...reported]));
    localStorage.setItem(K.chat,JSON.stringify(chat));
  }catch(e){/* גלישה פרטית / אחסון חסום — ממשיכים בלי שמירה */}
}
function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}

/* ---------- לוגיקת ההשוואה (תואם כל הדפדפנים, בלי lookbehind) ---------- */
function tokenize(text){
  return (text.match(/[A-Za-z0-9][A-Za-z0-9\-/]*/g)||[]);
}
function findInText(text){
  const toks=new Set(tokenize(text).map(t=>t.toLowerCase()));
  return weapons.filter(w=>toks.has(w.toLowerCase()));
}
function candidates(text){
  return [...new Set(tokenize(text))];
}

/* ---------- צ'אט ---------- */
function addMsg(who,html,store=true){
  const m={who,html,t:now()};
  if(store){chat.push(m);save()}
  const el=document.createElement('div');
  el.className='msg '+who;
  el.innerHTML=html+'<span class="t">'+m.t+'</span>';
  document.getElementById('chat').appendChild(el);
  scrollDown();
}
function scrollDown(){const c=document.getElementById('chat');c.scrollTop=c.scrollHeight}
function renderChat(){
  const c=document.getElementById('chat');c.innerHTML='';
  for(const m of chat){
    const el=document.createElement('div');
    el.className='msg '+m.who;
    el.innerHTML=m.html+'<span class="t">'+m.t+'</span>';
    c.appendChild(el);
  }
  scrollDown();
}

function sendReport(){
  const inp=document.getElementById('input');
  const text=inp.value.trim();
  if(!text) return;
  if(!weapons.length){addMsg('bot','אין רשימה. עבור ללשונית <b>הרשימה</b> והכנס מספרים.');return}
  addMsg('me',escapeHtml(text));
  inp.value='';inp.style.height='auto';

  const matched=findInText(text);
  let fresh=0;
  for(const w of matched){if(!reported.has(w)){reported.add(w);fresh++}}
  // מספרים שלא ברשימה (עם ספרה בלבד, להפחתת רעש)
  const lower=new Set(weapons.map(w=>w.toLowerCase()));
  const unknown=candidates(text).filter(c=>c.length>=3&&/\d/.test(c)&&!lower.has(c.toLowerCase()));
  save();updateChip();

  const missing=weapons.filter(w=>!reported.has(w));
  const done=weapons.length-missing.length;
  let h = fresh ? '<span class="ok">✔️ נקלטו '+fresh+' חדשים.</span>' : 'ℹ️ לא נמצאו מספרים חדשים בהודעה.';
  h += '<br>סה"כ דווחו <b>'+done+'/'+weapons.length+'</b>.';
  if(!missing.length){ h+='<br><span class="ok">✅ הכל דווח!</span>'; }
  else { h+='<br>נשארו '+missing.length+' (לחץ "מה חסר?").'; }
  if(unknown.length){ h+='<br><span class="unk">⚠️ דווחו מספרים שלא ברשימה: '+unknown.slice(0,15).map(escapeHtml).join(', ')+'</span>'; }
  addMsg('bot',h);
}

function askStatus(){
  if(!weapons.length){addMsg('bot','אין רשימה טעונה.');return}
  const missing=weapons.filter(w=>!reported.has(w));
  const done=weapons.length-missing.length;
  if(!missing.length){
    addMsg('bot','<span class="ok">✅ הכל דווח!</span> כל '+weapons.length+' הנשקים מסומנים.');
  }else{
    addMsg('bot','<span class="miss">⚠️ דווחו '+done+' מתוך '+weapons.length+'.</span><br>חסרים '+missing.length+':<ul>'+missing.map(w=>'<li>'+escapeHtml(w)+'</li>').join('')+'</ul>');
  }
}

function newDay(){
  if(!confirm('להתחיל יום חדש? כל הסימונים יימחקו (הרשימה נשארת).')) return;
  reported=new Set();save();updateChip();
  addMsg('bot','<span class="ok">🔄 יום חדש.</span> ממתין לדיווחים על '+weapons.length+' נשקים.');
}

/* ---------- רשימה ---------- */
function showTab(t){
  const chatOn=t==='chat';
  document.getElementById('chat').style.display=chatOn?'flex':'none';
  document.querySelector('.quick').style.display=chatOn?'flex':'none';
  document.querySelector('.composer').style.display=chatOn?'flex':'none';
  document.getElementById('list').style.display=chatOn?'none':'flex';
  document.getElementById('tabChat').classList.toggle('on',chatOn);
  document.getElementById('tabList').classList.toggle('on',!chatOn);
  if(!chatOn){document.getElementById('listText').value=weapons.join('\n');updateListCount()}
  else scrollDown();
}
function updateListCount(){
  const n=parseList(document.getElementById('listText').value).length;
  document.getElementById('listCount').textContent=n+' מספרים';
}
function parseList(raw){
  const seen=new Set(),out=[];
  for(let t of raw.split(/[\s,;]+/)){t=t.trim();if(t&&!seen.has(t)){seen.add(t);out.push(t)}}
  return out;
}
function saveList(){
  const newList=parseList(document.getElementById('listText').value);
  if(!newList.length){toast('הרשימה ריקה');return}
  weapons=newList;reported=new Set();save();updateChip();
  toast('נשמרו '+weapons.length+' מספרים ✓');
  addMsg('bot','<span class="ok">💾 נטענה רשימה:</span> '+weapons.length+' נשקים. הסימונים אופסו.');
  showTab('chat');
}

/* ---------- כללי ---------- */
function updateChip(){
  const c=document.getElementById('chip');
  if(!weapons.length){c.textContent='אין רשימה';c.className='chip';return}
  const done=weapons.filter(w=>reported.has(w)).length;
  c.innerHTML='<b>'+done+'</b> / '+weapons.length;
  c.className='chip '+(done===weapons.length?'full':'partial');
}
function escapeHtml(s){return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800)}

// auto-grow textarea
const inp=document.getElementById('input');
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,140)+'px'});
document.getElementById('listText').addEventListener('input',updateListCount);

// init
updateChip();
if(!chat.length){
  addMsg('bot','שלום! 👋 הדבק כאן כל דוח שמגיע אליך ואני אסמן וי על המספרים שדווחו.<br>בלשונית <b>הרשימה</b> מגדירים את מספרי הנשק.',true);
}
renderChat();
</script>
</body>
</html>
