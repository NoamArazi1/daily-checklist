<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f3d3e">
<title>מעקב צלם</title>
<style>
  :root{--bg:#0f1a1a;--panel:#132626;--panel2:#0f1f1f;--line:#21403f;--ink:#eaf4f2;--mut:#8fb3ad;--me:#1f6f5c;--bot:#1a2e2e;--accent:#37d39a;--warn:#e0a83a;--bad:#e06a5a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,"Heebo",Arial,sans-serif;display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
  header{background:linear-gradient(180deg,#15403c,#0f2e2c);padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:18px;margin:0;font-weight:700;flex:1}
  .chip{background:#0c2120;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:700;white-space:nowrap}
  .chip b{color:var(--accent)}.chip.partial b{color:var(--warn)}
  nav{display:flex;background:var(--panel2);border-bottom:1px solid var(--line)}
  nav button{flex:1;background:none;border:none;color:var(--mut);padding:12px 6px;font-size:15px;font-weight:700;font-family:inherit;border-bottom:3px solid transparent;cursor:pointer}
  nav button.on{color:var(--ink);border-bottom-color:var(--accent)}
  .view{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}.view.on{display:flex}
  .view>*{flex-shrink:0}   /* קריטי: שהכרטיסים לא יתכווצו ויחתכו את השורות — שיגלשו ויגללו */

  /* צ'אט */
  #chat{padding:14px;gap:10px}
  .msg{max-width:88%;padding:10px 14px;border-radius:16px;line-height:1.5;font-size:15px;white-space:pre-wrap;word-break:break-word}
  .msg.me{align-self:flex-start;background:var(--me);border-bottom-right-radius:4px}
  .msg.bot{align-self:flex-end;background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg .t{display:block;font-size:11px;color:var(--mut);margin-top:6px}
  .ok{color:var(--accent);font-weight:700}.unk{color:var(--bad);font-weight:700}.who{color:var(--warn);font-weight:700}.miss{color:var(--warn);font-weight:700}
  .composer{display:flex;gap:8px;padding:10px;background:var(--panel2);border-top:1px solid var(--line);align-items:flex-end}
  .composer textarea{flex:1;resize:none;min-height:46px;max-height:140px;background:#0b1a1a;color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:16px;font-family:inherit}
  .send{background:var(--accent);color:#04231a;border:none;border-radius:14px;padding:0 18px;height:46px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer}
  .quick{display:flex;gap:8px;padding:0 10px 10px;background:var(--panel2)}
  .quick button{flex:1;background:#0c2120;color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}

  /* טבלה (עריכה) */
  #table{padding:10px}
  .tnote{color:var(--mut);font-size:13px;padding:2px 4px 10px;line-height:1.5}
  .card{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--panel2)}
  .phead{display:flex;align-items:center;gap:8px;padding:10px;background:#14302d}
  .phead .pname{flex:1;min-width:0}
  .phead .ppn{width:104px;flex:none}
  .phead .pc{font-size:13px;font-weight:800;color:var(--warn);flex:none;min-width:34px;text-align:center}
  .phead .pc.full{color:var(--accent)}
  .cols{display:flex;gap:8px;padding:6px 10px 2px;color:var(--mut);font-size:12px;font-weight:700}
  .cols span:nth-child(1){flex:1}.cols span:nth-child(2){width:104px}.cols span:nth-child(3){width:46px;text-align:center}.cols span:nth-child(4){width:34px}
  .irow{display:flex;gap:8px;align-items:center;padding:5px 10px}
  .irow .iitem{flex:1;min-width:0}.irow .iser{width:104px;flex:none}
  input{background:#0b1a1a;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:16px;font-family:inherit;width:100%}
  input::placeholder{color:#5f7d78}
  .chk{width:46px;height:42px;flex:none;border:1px solid var(--line);border-radius:10px;background:#0b1a1a;font-size:18px;cursor:pointer}
  .chk.on{background:#10302a;border-color:#1f6f5c}
  .del{width:34px;height:42px;flex:none;border:none;background:none;color:var(--mut);font-size:16px;cursor:pointer}
  .add{margin:6px 10px 12px;background:#0c2120;color:var(--ink);border:1px dashed var(--line);border-radius:10px;padding:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;width:calc(100% - 20px)}
  .addp{margin:4px 0 10px;background:var(--accent);color:#04231a;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;width:100%}
  .addp.sec{background:#0c2120;color:var(--ink);border:1px solid var(--line)}

  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#04231a;color:var(--accent);border:1px solid var(--accent);padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:30}.toast.show{opacity:1}
</style>
</head>
<body>
  <header><h1>🎖️ מעקב צלם</h1><div class="chip" id="chip">—</div></header>
  <nav>
    <button id="tabChat" class="on" onclick="showTab('chat')">צ'אט</button>
    <button id="tabTable" onclick="showTab('table')">טבלה</button>
  </nav>

  <div id="chat" class="view on"></div>
  <div id="table" class="view"></div>

  <div class="quick" id="quick">
    <button onclick="showTab('table')">📋 פתח טבלה</button>
    <button onclick="newDay()">🔄 יום חדש</button>
  </div>
  <div class="composer" id="composer">
    <textarea id="input" placeholder="הדבק כאן את הדיווח של חייל…" rows="1"></textarea>
    <button class="send" onclick="sendReport()">שלח</button>
  </div>

  <div class="toast" id="toast"></div>

<script>
const HE='֐-׿';
const K={people:'tz_people2',chat:'tz_chat2'};
let people = load(K.people, []);
let chat = load(K.chat, []);

function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function save(){try{localStorage.setItem(K.people,JSON.stringify(people));localStorage.setItem(K.chat,JSON.stringify(chat))}catch(e){}}
function now(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function escapeHtml(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function attr(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function allItems(){return people.flatMap(p=>p.items)}
function counts(){const all=allItems();return{total:all.length,done:all.filter(it=>it.reported).length}}

/* ---------- התאמת דיווח (מזוהה לפי אדם) ---------- */
function nums3(text){return text.match(/\d{3,}/g)||[]}
function nameInText(name,text){
  if(!name||name.length<2) return false;
  const isL=c=>new RegExp('[A-Za-z0-9'+HE+']').test(c||'');
  let i=text.indexOf(name);
  while(i!==-1){if(!isL(text[i-1])&&!isL(text[i+name.length]))return true;i=text.indexOf(name,i+1)}
  return false;
}
function markReport(text){
  // מפות בעלות: מספר צלם -> חייל, מספר אישי -> חייל
  const serialOwner={}, pnOwner={};
  people.forEach((p,i)=>{
    if(p.pn) pnOwner[p.pn]=i;
    p.items.forEach(it=>{ if(it.serial) serialOwner[it.serial]=i; });
  });
  // האם השורה היא כותרת של חייל (לפי מספר אישי או שם)? מחזיר אינדקס או -1
  function headerSoldier(line){
    const ns=line.match(/\d{4,}/g)||[];
    for(const n of ns){ if(n in pnOwner) return pnOwner[n]; }
    for(let i=0;i<people.length;i++){ const nm=(people[i].name||'').trim(); if(nm.length>=2 && nameInText(nm,line)) return i; }
    return -1;
  }
  // פיצול הדיווח לבלוקים לפי חייל — כל שורה שייכת לחייל שמעליה עד השם הבא
  const bySoldier={}; let cur=-1;
  for(const line of text.split('\n')){
    const si=headerSoldier(line);
    if(si!==-1) cur=si;
    if(cur!==-1) bySoldier[cur]=(bySoldier[cur]||'')+line+'\n';
  }
  const ids=Object.keys(bySoldier);
  const summary=[], warnings=[], unknown=[];
  if(ids.length){
    for(const si of ids){
      const p=people[si], bt=bySoldier[si];
      const bset=new Set(bt.match(/\d{3,}/g)||[]);
      let done=0;
      for(const it of p.items){                            // התמונה המלאה של החייל בבלוק שלו
        const hit = it.serial ? bset.has(it.serial) : nameInText(it.item,bt);
        it.reported=hit; if(hit)done++;
      }
      summary.push({name:p.name||'חייל',done,total:p.items.length});
      for(const n of bset){                                // אזהרות על מספרים בבלוק הזה
        if(n in pnOwner) continue;
        if(!(n in serialOwner)) unknown.push(n);
        else if(+serialOwner[n]!==+si) warnings.push(n+' שייך ל'+(people[serialOwner[n]].name||'חייל אחר'));
      }
    }
  }else{
    // לא זוהה אף חייל — לא מאפסים; מסמנים רק לפי מספר צלם ומתריעים על לא-מוכרים
    for(const n of (text.match(/\d{3,}/g)||[])){
      if(n in serialOwner){ const it=people[serialOwner[n]].items.find(x=>x.serial===n); if(it)it.reported=true; }
      else if(!(n in pnOwner)) unknown.push(n);
    }
  }
  return {scoped:ids.length>0, summary, warnings, unknown:[...new Set(unknown)]};
}

/* ---------- צ'אט ---------- */
function addMsg(who,html,store=true){
  const m={who,html,t:now()};if(store){chat.push(m);save()}
  const el=document.createElement('div');el.className='msg '+who;el.innerHTML=html+'<span class="t">'+m.t+'</span>';
  document.getElementById('chat').appendChild(el);scrollDown();
}
function scrollDown(){const c=document.getElementById('chat');c.scrollTop=c.scrollHeight}
function renderChat(){const c=document.getElementById('chat');c.innerHTML='';for(const m of chat){const el=document.createElement('div');el.className='msg '+m.who;el.innerHTML=m.html+'<span class="t">'+m.t+'</span>';c.appendChild(el)}scrollDown()}

function sendReport(){
  const inp=document.getElementById('input');const text=inp.value.trim();if(!text)return;
  if(!allItems().length){addMsg('bot','אין רשימה עדיין. עבור ללשונית <b>טבלה</b> והכנס אנשים ופריטים (או "ייבוא מהיר").');return}
  addMsg('me',escapeHtml(text));inp.value='';inp.style.height='auto';
  const {scoped,summary,warnings,unknown}=markReport(text);save();updateChip();
  const {total,done}=counts();
  let h='';
  if(scoped){
    h+=summary.map(s=>'<span class="who">👤 '+escapeHtml(s.name)+'</span>: '
        +(s.done===s.total?'<span class="ok">':'<span class="miss">')+s.done+'/'+s.total+'</span>'
        +(s.done===s.total?' ✅':'')).join('<br>');
  }else{
    h+='<span class="unk">⚠️ לא זיהיתי חייל מהדיווח. ודא שהוא כולל שם / מספר אישי / מספר צלם של החייל.</span>';
  }
  h+='<br>סה"כ <b>'+done+'/'+total+'</b> אצל החיילים.';
  if(warnings&&warnings.length) h+='<br><span class="unk">⚠️ מספר אצל החייל הלא נכון: '+warnings.slice(0,15).map(escapeHtml).join('; ')+'</span>';
  if(unknown.length) h+='<br><span class="unk">⚠️ מספרים שלא ברשימה: '+unknown.slice(0,15).map(escapeHtml).join(', ')+'</span>';
  addMsg('bot',h);renderTable();
}
function newDay(){
  if(!confirm('להתחיל יום חדש? כל הסימונים (דווח היום) יתאפסו.'))return;
  allItems().forEach(it=>it.reported=false);save();updateChip();renderTable();
  addMsg('bot','<span class="ok">🔄 יום חדש.</span> כל הסימונים אופסו.');
}

/* ---------- טבלה (עריכה) ---------- */
function renderTable(){
  const box=document.getElementById('table');const sc=box.scrollTop;
  let html='<div class="tnote">טבלה לפי אנשים. מלא ידנית: שם + מספר אישי, ולכל פריט: שם, מספר צלם, ודיווח. ✅=דווח היום, ❌=לא. הצ\'אט ממלא את "דווח" אוטומטית לפי הדיווח של החייל המתאים.</div>';
  if(!people.length) html+='<div class="tnote">עוד אין אנשים. הוסף חייל, או "ייבוא מהיר".</div>';
  people.forEach((p,pi)=>{
    const gt=p.items.length,gd=p.items.filter(it=>it.reported).length;
    html+='<div class="card"><div class="phead">'
      +'<input class="pname" data-pi="'+pi+'" placeholder="שם החייל" value="'+attr(p.name)+'">'
      +'<input class="ppn" data-pi="'+pi+'" placeholder="מס׳ אישי" inputmode="numeric" value="'+attr(p.pn)+'">'
      +'<span class="pc '+(gt&&gd===gt?'full':'')+'">'+gd+'/'+gt+'</span>'
      +'<button class="del" data-act="delp" data-pi="'+pi+'">🗑</button></div>';
    html+='<div class="cols"><span>פריט</span><span>מספר צלם</span><span>דווח</span><span></span></div>';
    p.items.forEach((it,ii)=>{
      html+='<div class="irow">'
        +'<input class="iitem" data-pi="'+pi+'" data-ii="'+ii+'" placeholder="פריט" value="'+attr(it.item)+'">'
        +'<input class="iser" data-pi="'+pi+'" data-ii="'+ii+'" placeholder="—" inputmode="numeric" value="'+attr(it.serial)+'">'
        +'<button class="chk '+(it.reported?'on':'')+'" data-act="toggle" data-pi="'+pi+'" data-ii="'+ii+'">'+(it.reported?'✅':'❌')+'</button>'
        +'<button class="del" data-act="deli" data-pi="'+pi+'" data-ii="'+ii+'">✕</button></div>';
    });
    html+='<button class="add" data-act="addi" data-pi="'+pi+'">＋ פריט</button></div>';
  });
  html+='<button class="addp" data-act="addp">＋ הוסף חייל</button>';
  box.innerHTML=html;box.scrollTop=sc;updateChip();
}
document.getElementById('table').addEventListener('input',e=>{
  const t=e.target,pi=+t.dataset.pi,ii=+t.dataset.ii;
  if(t.classList.contains('pname'))people[pi].name=t.value;
  else if(t.classList.contains('ppn'))people[pi].pn=t.value.trim();
  else if(t.classList.contains('iitem'))people[pi].items[ii].item=t.value;
  else if(t.classList.contains('iser'))people[pi].items[ii].serial=t.value.trim();
  save();
});
document.getElementById('table').addEventListener('click',e=>{
  const b=e.target.closest('[data-act]');if(!b)return;
  const act=b.dataset.act,pi=+b.dataset.pi,ii=+b.dataset.ii;
  if(act==='toggle'){const it=people[pi].items[ii];it.reported=!it.reported}
  else if(act==='addi'){people[pi].items.push({item:'',serial:'',reported:false})}
  else if(act==='deli'){people[pi].items.splice(ii,1)}
  else if(act==='addp'){people.push({name:'',pn:'',items:[{item:'',serial:'',reported:false}]})}
  else if(act==='delp'){if(!confirm('למחוק את החייל?'))return;people.splice(pi,1)}
  save();renderTable();
});

/* ---------- ניווט/כללי ---------- */
function showTab(t){
  ['chat','table'].forEach(v=>document.getElementById(v).classList.toggle('on',t===v));
  document.getElementById('tabChat').classList.toggle('on',t==='chat');
  document.getElementById('tabTable').classList.toggle('on',t==='table');
  const show=t==='chat'?'flex':'none';
  document.getElementById('quick').style.display=show;document.getElementById('composer').style.display=show;
  if(t==='table')renderTable();if(t==='chat')scrollDown();
}
function updateChip(){const c=document.getElementById('chip');const{total,done}=counts();if(!total){c.textContent='אין רשימה';c.className='chip';return}c.innerHTML='<b>'+done+'</b> / '+total;c.className='chip '+(done===total?'':'partial')}
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800)}

const inp=document.getElementById('input');
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,140)+'px'});

updateChip();
if(!chat.length){addMsg('bot','שלום! 👋<br>1. בלשונית <b>טבלה</b> הכנס אנשים ופריטים (או "ייבוא מהיר" להדבקה חד-פעמית).<br>2. כאן הדבק את הדיווח של כל חייל — אני מזהה לפי השם/מספר אישי ומסמן רק את הפריטים שלו.<br>3. בטבלה תראה ✅/❌ בעמודת "דווח".',true)}
renderChat();renderTable();
</script>
</body>
</html>
